<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QMC Team Days</title>
  <meta name="description" content="Live countdown to April 28, 2026 at 9:00 AM" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-b" aria-hidden="true"></div>

  <main class="page">
    <section class="card" aria-labelledby="title">
      <p class="eyebrow">Target Date</p>
      <h1 id="title">QMC Team Days</h1>
      <p class="subtitle">Local time countdown</p>

      <div class="timer" role="timer" aria-live="polite" aria-atomic="true">
        <div class="unit">
          <span id="days" class="value">0</span>
          <span class="label">Days</span>
        </div>
        <div class="unit">
          <span id="hours" class="value">0</span>
          <span class="label">Hours</span>
        </div>
        <div class="unit">
          <span id="minutes" class="value">0</span>
          <span class="label">Minutes</span>
        </div>
        <div class="unit">
          <span id="seconds" class="value">0</span>
          <span class="label">Seconds</span>
        </div>
      </div>

      <p id="status" class="status">Counting down...</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
